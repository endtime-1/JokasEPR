# ══════════════════════════════════════════════════════════════════════════════
# Jokas ERP — PostgreSQL 16 Production Configuration
# Tuned for a 2 GB RAM VPS with ≤ 10 concurrent application connections.
# Adjust shared_buffers and effective_cache_size proportionally for larger RAM.
# ══════════════════════════════════════════════════════════════════════════════

# ── Connections ───────────────────────────────────────────────────────────────
max_connections = 50                    # Keep low; Prisma pools at the app level
superuser_reserved_connections = 3      # Reserve for admin access

# ── Memory ────────────────────────────────────────────────────────────────────
shared_buffers = 512MB                  # ~25% of total RAM
effective_cache_size = 1536MB           # ~75% of total RAM (planner hint, not allocated)
work_mem = 16MB                         # Per sort/hash; multiply by max_connections
maintenance_work_mem = 128MB            # For VACUUM, CREATE INDEX, etc.
temp_buffers = 8MB
wal_buffers = 16MB

# ── Checkpoint tuning ────────────────────────────────────────────────────────
checkpoint_completion_target = 0.9
min_wal_size = 256MB
max_wal_size = 1GB

# ── Query planner ────────────────────────────────────────────────────────────
default_statistics_target = 100
random_page_cost = 1.1                  # SSD: set to 1.1; HDD: leave at 4.0
effective_io_concurrency = 200          # SSD: 200; HDD: 2

# ── Parallel queries ─────────────────────────────────────────────────────────
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# ── Logging ───────────────────────────────────────────────────────────────────
log_destination = 'stderr'
logging_collector = off                 # Stderr goes to Docker → json-file driver
log_line_prefix = '%t [%p] %u@%d '
log_connections = on
log_disconnections = on
log_duration = off
log_min_duration_statement = 2000       # Log queries slower than 2 s
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0                      # Log all temp files
deadlock_timeout = 1s

# ── Autovacuum ────────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 1min
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02

# ── Locale and timezone ───────────────────────────────────────────────────────
timezone = 'Africa/Accra'
lc_messages = 'en_US.UTF-8'

# ── Replication (leave as is unless you add a read replica) ──────────────────
wal_level = replica
max_wal_senders = 3
