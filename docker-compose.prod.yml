services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
    # PostgreSQL port NOT exposed externally — accessible only inside Docker network
    deploy:
      resources:
        limits:
          memory: 1G

  # ── NestJS API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/docker/api.prod.Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - uploads:/app/uploads
      - api_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    # API port NOT exposed externally — nginx proxies to it
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Next.js Frontend ───────────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: infra/docker/web.prod.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - internal
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ── Nginx (reverse proxy + SSL) ────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Certbot (SSL certificate renewal) ─────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renews on container start; wire to a cron job on the host
    command: renew --quiet
    profiles:
      - certbot

volumes:
  postgres_data:
    driver: local
  uploads:
    driver: local
  api_logs:
    driver: local
  nginx_logs:
    driver: local
  certbot_conf:
    driver: local
  certbot_www:
    driver: local

networks:
  internal:
    driver: bridge
