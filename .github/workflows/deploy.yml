name: Build & Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install all dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm --filter @jokas/db prisma:generate

      - name: Build shared package
        run: pnpm --filter @jokas/shared build

      - name: Build API
        run: pnpm --filter @jokas/api build

      - name: Build Web
        run: pnpm --filter @jokas/web build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Create standalone deploy bundles with only production deps
      - name: Bundle API for deployment
        run: |
          pnpm --filter @jokas/api deploy --prod --legacy /tmp/api-deploy
          cp -r apps/api/dist /tmp/api-deploy/dist

          # pnpm deploy copies @prisma/client from the npm store (pre-generate stub).
          # We must overwrite it with the generated version so enums like AuditAction exist.
          for CANDIDATE in \
            "packages/db/node_modules/@prisma/client" \
            "node_modules/@prisma/client"; do
            if [ -f "$CANDIDATE/index.js" ]; then PRISMA_PKG="$CANDIDATE"; break; fi
          done
          if [ -n "$PRISMA_PKG" ]; then
            echo "Copying generated @prisma/client from $PRISMA_PKG"
            rm -rf /tmp/api-deploy/node_modules/@prisma/client
            cp -rL "$PRISMA_PKG" /tmp/api-deploy/node_modules/@prisma/client
            mkdir -p /tmp/api-deploy/dist/prisma-client
            cp -rL "$PRISMA_PKG/." /tmp/api-deploy/dist/prisma-client/
          else
            echo "ERROR: generated @prisma/client not found"; exit 1
          fi

          # Copy the .prisma/client runtime (native query engine binary)
          # Search broadly — pnpm may place it anywhere in node_modules tree
          PRISMA_RUNTIME=$(find . -path "*/.prisma/client" -type d 2>/dev/null \
            | grep -v ".git" | head -1)
          if [ -z "$PRISMA_RUNTIME" ]; then
            # Fallback: find by binary filename
            BINARY=$(find . \( -name "*rhel-openssl*" -o -name "libquery_engine*" \) \
              2>/dev/null | grep -v ".git" | head -1)
            [ -n "$BINARY" ] && PRISMA_RUNTIME=$(dirname "$BINARY")
          fi
          echo "Prisma runtime: ${PRISMA_RUNTIME:-NOT FOUND}"
          if [ -n "$PRISMA_RUNTIME" ]; then
            mkdir -p /tmp/api-deploy/node_modules/.prisma
            rm -rf /tmp/api-deploy/node_modules/.prisma/client
            cp -rL "$PRISMA_RUNTIME" /tmp/api-deploy/node_modules/.prisma/client
            mkdir -p /tmp/api-deploy/dist/prisma-runtime
            cp -rL "$PRISMA_RUNTIME/." /tmp/api-deploy/dist/prisma-runtime/
          else
            echo "ERROR: Prisma runtime not found — API will crash"; exit 1
          fi

      - name: Bundle Web for deployment
        run: |
          pnpm --filter @jokas/web deploy --prod --legacy /tmp/web-deploy
          cp -r apps/web/.next /tmp/web-deploy/.next
          cp -r apps/web/public /tmp/web-deploy/public 2>/dev/null || true
          # Standalone mode: server.js lives at .next/standalone/apps/web/server.js
          # and resolves static files via __dirname/.next/static — copy them there
          mkdir -p /tmp/web-deploy/.next/standalone/apps/web/.next
          cp -r apps/web/.next/static /tmp/web-deploy/.next/standalone/apps/web/.next/static
          cp -r apps/web/public /tmp/web-deploy/.next/standalone/apps/web/public 2>/dev/null || true

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo "${{ secrets.HOSTINGER_SSH_KNOWN_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          # Connection-keeping options so rsync doesn't time out mid-transfer
          cat > ~/.ssh/config << 'EOF'
          Host *
            ConnectTimeout 60
            ServerAliveInterval 30
            ServerAliveCountMax 10
            TCPKeepAlive yes
          EOF

      - name: Upload API to Hostinger
        run: |
          for attempt in 1 2 3; do
            rsync -avz --partial --timeout=300 \
              -e "ssh -p 65002 -i ~/.ssh/id_rsa" \
              /tmp/api-deploy/ \
              ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/domains/jokasfarms.com/nodejs/apps/api/ \
              && { echo "API upload succeeded on attempt $attempt"; break; } \
              || { echo "Attempt $attempt failed; retrying in 15s..."; sleep 15; }
          done

      - name: Upload Web to Hostinger
        run: |
          for attempt in 1 2 3; do
            rsync -avz --partial --timeout=300 --no-perms --omit-dir-times \
              --exclude='.next/cache' \
              -e "ssh -p 65002 -i ~/.ssh/id_rsa" \
              /tmp/web-deploy/ \
              ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/domains/jokasfarms.com/nodejs/apps/web/ \
              && { echo "Web upload succeeded on attempt $attempt"; break; } \
              || { echo "Attempt $attempt failed; retrying in 15s..."; sleep 15; }
          done

      - name: Upload DB migrations and scripts
        run: |
          rsync -avz --partial --timeout=120 \
            -e "ssh -p 65002 -i ~/.ssh/id_rsa" \
            packages/db/prisma/ \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/domains/jokasfarms.com/nodejs/prisma/
          rsync -avz --partial --timeout=120 \
            -e "ssh -p 65002 -i ~/.ssh/id_rsa" \
            packages/db/scripts/sync-permissions.mjs \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/domains/jokasfarms.com/nodejs/apps/api/sync-permissions.mjs

      - name: Upload root startup files
        run: |
          rsync -avz --partial --timeout=120 \
            -e "ssh -p 65002 -i ~/.ssh/id_rsa" \
            ecosystem.config.js start.js package.json \
            ${{ secrets.HOSTINGER_USER }}@${{ secrets.HOSTINGER_HOST }}:~/domains/jokasfarms.com/nodejs/

      - name: Deploy and restart on Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          # command_timeout sets how long the SSH action waits before giving up.
          command_timeout: 5m
          script: |
            set -e
            source ~/.bashrc 2>/dev/null || source ~/.profile 2>/dev/null || true

            NODE=/opt/alt/alt-nodejs22/root/usr/bin/node
            APP_DIR=~/domains/jokasfarms.com/nodejs
            PRISMA=$APP_DIR/apps/api/node_modules/.bin/prisma

            # ── Load DATABASE_URL from .env if not in SSH session env ─────────
            # Hostinger injects hPanel env vars into Passenger, not SSH sessions.
            # Source the .env file the app writes on first setup as a fallback.
            if [ -z "$DATABASE_URL" ]; then
              for ENV_FILE in "$APP_DIR/.env" "$HOME/.env"; do
                if [ -f "$ENV_FILE" ]; then
                  set -a; source "$ENV_FILE" 2>/dev/null || true; set +a
                  echo "Loaded env from $ENV_FILE (DATABASE_URL ${DATABASE_URL:+SET}${DATABASE_URL:-STILL MISSING})"
                  break
                fi
              done
            fi

            # ── Migrations ────────────────────────────────────────────────────
            if [ -z "$DATABASE_URL" ]; then
              echo "WARNING: DATABASE_URL not set — skipping migrations"
            elif [ -f "$PRISMA" ]; then
              $NODE "$PRISMA" migrate deploy \
                --schema="$APP_DIR/prisma/schema.prisma" \
                && echo "Migrations applied." \
                || echo "WARNING: migrations failed or already up to date."
            else
              echo "WARNING: prisma binary not found — skipping migrations"
            fi

            # ── Permission sync ────────────────────────────────────────────────
            SYNC_SCRIPT=$APP_DIR/apps/api/sync-permissions.mjs
            if [ -z "$DATABASE_URL" ]; then
              echo "WARNING: DATABASE_URL not set — skipping permission sync"
            elif [ -f "$SYNC_SCRIPT" ]; then
              $NODE "$SYNC_SCRIPT" \
                && echo "Permissions synced." \
                || echo "WARNING: permissions sync failed."
            else
              echo "WARNING: sync-permissions.mjs not found — skipping"
            fi

            # ── Kill accumulated old processes ─────────────────────────────────
            # Strategy: kill web/api children directly (safe), then signal Passenger
            # to restart start.js cleanly via restart.txt. Do NOT kill start.js via
            # pgrep — that puts our process in Passenger's group kill blast radius.

            # 1. PID file kill — latest registered web/api child PIDs
            PID_FILE=/tmp/jokas-child-pids.json
            if [ -f "$PID_FILE" ]; then
              $NODE -e "
                try {
                  const data = JSON.parse(require('fs').readFileSync('$PID_FILE','utf8'));
                  const all = Array.isArray(data)
                    ? data.filter(Boolean)
                    : [data.proxy, data.web, data.api].filter(Boolean);
                  all.forEach(pid => { try { process.kill(pid, 9); } catch {} });
                  console.log('Killed PIDs: ' + (all.join(', ') || '(none)'));
                } catch(e) { console.log('PID file error: ' + e.message); }
              " 2>/dev/null || true
            fi

            # 2. Port-based kill — drains orphaned web/api processes accumulated
            #    from previous deploys that the PID file never recorded.
            for PORT in 3001 4001; do
              { fuser -k -9 "$PORT/tcp" 2>/dev/null && echo "Killed port $PORT owner"; } || \
              { lsof -ti ":$PORT" 2>/dev/null | xargs kill -9 2>/dev/null && echo "Killed port $PORT owner (lsof)"; } || true
            done

            # 3. Pattern-based kill — any remaining API/web bundle processes
            pkill -9 -u "$(whoami)" -f "apps/api/dist/bundle" 2>/dev/null && echo "Killed api bundle processes" || true
            pkill -9 -u "$(whoami)" -f "apps/web.*server\.js" 2>/dev/null && echo "Killed web server processes" || true
            sleep 1

            # ── Signal Passenger to respawn start.js ──────────────────────────
            # Passenger sends SIGTERM to start.js → start.js calls killAll() and
            # exits cleanly, then Passenger restarts it with the new code.
            mkdir -p $APP_DIR/tmp
            touch $APP_DIR/tmp/restart.txt
            echo "Passenger restart signalled."
            sleep 5

            # ── Smoke test — verify the app is actually serving HTTP ───────────
            DOMAIN="https://jokasfarms.com"
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 20 "$DOMAIN/__status" || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Smoke test PASSED — app is live (HTTP $STATUS)"
            elif [ "$STATUS" = "503" ]; then
              # 503 = start.js startup page — server is alive and starting up, not crashed
              echo "Smoke test OK — server is starting up (HTTP $STATUS)"
            else
              echo "Smoke test FAILED — unexpected status: HTTP $STATUS"
              echo "Check Hostinger logs. The previous version may still be running."
              exit 1
            fi

            echo "Running node processes: $(ps aux | grep '[n]ode' | grep "$(whoami)" | wc -l)"
