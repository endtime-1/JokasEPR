services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jokas
      POSTGRES_PASSWORD: jokas_dev_password
      POSTGRES_DB: jokas_erp
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jokas -d jokas_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4001:4001"

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4001/api/v1
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres_data:
